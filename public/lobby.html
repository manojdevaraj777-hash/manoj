<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IPL Auction - Lobby</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #06111f;
            --panel: rgba(8, 24, 41, 0.78);
            --panel-2: rgba(7, 19, 34, 0.88);
            --line: rgba(255, 255, 255, 0.14);
            --text: #f4f8ff;
            --muted: #a9bfd7;
            --accent: #ff7a18;
            --accent-2: #ffc44d;
            --ok: #27d3a8;
            --warn: #ff7e79;
            --shadow: 0 24px 55px rgba(0, 0, 0, 0.35);
            --page-max-width: 1460px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            min-height: 100svh;
            min-height: 100dvh;
            font-family: 'Manrope', sans-serif;
            font-size: clamp(14px, 0.26vw + 12px, 18px);
            color: var(--text);
            background:
                radial-gradient(circle at 14% 8%, rgba(255, 122, 24, 0.17), transparent 34%),
                radial-gradient(circle at 85% 26%, rgba(39, 211, 168, 0.14), transparent 36%),
                linear-gradient(140deg, #030a13 0%, #081527 56%, #0a1e38 100%);
            overflow-x: hidden;
            overflow-y: auto;
        }

        .container {
            width: calc(100% - 32px);
            max-width: var(--page-max-width);
            margin: 0 auto;
            padding: 20px 16px 34px;
            display: grid;
            gap: 18px;
        }

        .brand-strip {
            background: var(--panel-2);
            border: 1px solid var(--line);
            border-radius: 16px;
            box-shadow: var(--shadow);
            padding: 10px 14px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
        }

        .brand-left {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .brand-left img {
            width: 44px;
            height: 44px;
        }

        .brand-title {
            font-family: 'Bebas Neue', sans-serif;
            letter-spacing: 0.08em;
            color: #ffecce;
            font-size: 28px;
            line-height: 1;
        }

        .brand-sub {
            color: var(--muted);
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .brand-pill {
            border-radius: 999px;
            border: 1px solid rgba(255, 196, 77, 0.4);
            background: rgba(255, 122, 24, 0.12);
            color: #ffe3b0;
            padding: 7px 11px;
            font-size: 11px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .header {
            background: var(--panel-2);
            border: 1px solid var(--line);
            border-radius: 18px;
            box-shadow: var(--shadow);
            padding: 18px;
            display: grid;
            grid-template-columns: 1fr auto;
            align-items: center;
            gap: 16px;
            animation: slide-down 450ms ease;
        }

        .room-meta {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 10px;
        }

        .room-code {
            font-family: 'Bebas Neue', sans-serif;
            letter-spacing: 0.06em;
            font-size: 40px;
            color: #ffe9c2;
            line-height: 1;
        }

        .copy-btn {
            border: 0;
            border-radius: 10px;
            padding: 9px 13px;
            font-weight: 800;
            cursor: pointer;
            background: linear-gradient(100deg, #53efd3, #b1ffe8);
            color: #033126;
        }

        .mode-chip {
            border-radius: 999px;
            padding: 7px 13px;
            border: 1px solid rgba(255, 255, 255, 0.18);
            background: rgba(255, 255, 255, 0.1);
            font-weight: 700;
            font-size: 12px;
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }

        .lobby-title {
            font-family: 'Bebas Neue', sans-serif;
            letter-spacing: 0.06em;
            font-size: 36px;
            color: #fff3dd;
        }

        .quick-stats {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 12px;
        }

        .stat-card {
            background: var(--panel);
            border: 1px solid var(--line);
            border-radius: 14px;
            padding: 12px;
            box-shadow: var(--shadow);
        }

        .stat-label {
            color: var(--muted);
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .stat-value {
            font-family: 'Bebas Neue', sans-serif;
            letter-spacing: 0.06em;
            color: #fff0cf;
            font-size: 34px;
            line-height: 1;
            margin-top: 6px;
        }

        .teams-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(270px, 1fr));
            gap: 12px;
        }

        .team-card {
            background: var(--panel);
            border: 1px solid var(--line);
            border-top: 3px solid var(--team-color, rgba(255, 255, 255, 0.4));
            border-radius: 14px;
            padding: 14px;
            display: grid;
            gap: 8px;
            transition: transform 180ms ease, border-color 180ms ease, box-shadow 180ms ease;
        }

        .team-card:hover {
            transform: translateY(-2px);
            border-color: rgba(255, 196, 77, 0.65);
            box-shadow: 0 10px 28px rgba(0, 0, 0, 0.32);
        }

        .team-card.selected {
            border-color: rgba(39, 211, 168, 0.85);
            box-shadow: 0 0 0 1px rgba(39, 211, 168, 0.45) inset;
            animation: selected-pulse 1.1s ease;
        }

        .team-top {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .team-logo {
            width: 46px;
            height: 46px;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.22);
            background: radial-gradient(circle at 30% 30%, rgba(255, 255, 255, 0.14), rgba(255, 255, 255, 0.05));
            object-fit: contain;
            object-position: center;
            padding: 3px;
            flex: 0 0 auto;
        }

        .team-card.taken {
            opacity: 0.62;
        }

        .team-name {
            font-weight: 800;
            font-size: 17px;
            line-height: 1.3;
        }

        .team-code {
            font-family: 'Bebas Neue', sans-serif;
            color: #ffd89d;
            letter-spacing: 0.08em;
            font-size: 24px;
            line-height: 1;
        }

        .team-info {
            color: var(--muted);
            font-size: 13px;
        }

        .team-action {
            margin-top: 2px;
        }

        .team-btn {
            border: 0;
            border-radius: 10px;
            padding: 9px 11px;
            width: 100%;
            cursor: pointer;
            color: white;
            font-weight: 800;
            background: linear-gradient(100deg, #ff7a18, #ff5e54);
        }

        .status-chip {
            border-radius: 8px;
            padding: 8px 10px;
            text-align: center;
            font-size: 12px;
            font-weight: 700;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.1);
        }

        .status-chip.mine {
            background: rgba(39, 211, 168, 0.14);
            border-color: rgba(39, 211, 168, 0.45);
            color: #aaf4e3;
        }

        .status-chip.taken {
            background: rgba(255, 126, 121, 0.14);
            border-color: rgba(255, 126, 121, 0.45);
            color: #ffc3c0;
        }

        .panels {
            display: grid;
            grid-template-columns: 1.5fr 1fr;
            gap: 12px;
        }

        .players-list,
        .status-panel {
            background: var(--panel);
            border: 1px solid var(--line);
            border-radius: 14px;
            padding: 15px;
        }

        .players-list h3,
        .status-panel h3 {
            font-family: 'Bebas Neue', sans-serif;
            letter-spacing: 0.05em;
            color: #ffe4b7;
            font-size: 28px;
            margin-bottom: 8px;
        }

        .players-wrap {
            max-height: 255px;
            overflow: auto;
            display: grid;
            gap: 8px;
            padding-right: 4px;
        }

        .player-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 10px;
            padding: 9px 11px;
            font-size: 13px;
            background: rgba(255, 255, 255, 0.05);
        }

        .player-role {
            color: var(--muted);
        }

        .player-item.reconnecting {
            border-color: rgba(255, 196, 77, 0.4);
            background: rgba(255, 196, 77, 0.09);
        }

        .start-btn {
            border: 0;
            border-radius: 999px;
            width: 100%;
            padding: 14px;
            margin-top: 10px;
            background: linear-gradient(100deg, #27d3a8, #57f5cf);
            color: #062f25;
            font-weight: 900;
            letter-spacing: 0.04em;
            font-size: 14px;
            cursor: pointer;
            transition: transform 180ms ease, opacity 180ms ease;
        }

        .start-btn:hover {
            transform: translateY(-2px);
        }

        .start-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .warning {
            margin-top: 8px;
            color: #ffd0ce;
            min-height: 18px;
            font-size: 13px;
        }

        .toast {
            position: fixed;
            right: 16px;
            bottom: 16px;
            background: rgba(7, 19, 34, 0.95);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-left: 4px solid #54f0d6;
            border-radius: 10px;
            color: #d8f3ed;
            padding: 10px 12px;
            font-size: 13px;
            z-index: 30;
            opacity: 0;
            transform: translateY(10px);
            transition: opacity 200ms ease, transform 200ms ease;
        }

        .toast.show {
            opacity: 1;
            transform: translateY(0);
        }

        .info-points {
            display: grid;
            gap: 6px;
            color: var(--muted);
            font-size: 13px;
        }

        @keyframes slide-down {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes selected-pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.01); }
            100% { transform: scale(1); }
        }

        @media (min-width: 1500px) {
            .container {
                padding: 28px 24px 40px;
                gap: 20px;
            }

            .header {
                padding: 22px;
            }

            .room-code {
                font-size: 52px;
            }

            .lobby-title {
                font-size: 42px;
            }

            .teams-grid {
                grid-template-columns: repeat(5, minmax(0, 1fr));
                gap: 14px;
            }

            .team-card {
                padding: 16px;
            }

            .team-name {
                font-size: 18px;
            }
        }

        @media (min-width: 2100px) {
            .container {
                width: calc(100% - 32px);
                max-width: var(--page-max-width);
            }

            .teams-grid {
                grid-template-columns: repeat(6, minmax(0, 1fr));
            }

            .panels {
                grid-template-columns: 2fr 1fr;
            }
        }

        @media (min-width: 1024px) {
            .container {
                width: calc(100% - 32px);
                max-width: var(--page-max-width);
                padding: 14px;
                gap: 12px;
            }

            .header {
                padding: 14px;
            }

            .room-code {
                font-size: 34px;
            }

            .lobby-title {
                font-size: 30px;
            }

            .teams-grid {
                align-content: start;
                gap: 10px;
            }

            .team-card {
                padding: 12px;
            }

            .players-list,
            .status-panel {
                min-height: 170px;
            }

            .players-wrap {
                max-height: 180px;
            }
        }

        @media (max-width: 980px) {
            .panels {
                grid-template-columns: 1fr;
            }

            .quick-stats {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 680px) {
            .brand-strip {
                flex-direction: column;
                align-items: flex-start;
            }

            .header {
                grid-template-columns: 1fr;
            }

            .room-code {
                font-size: 34px;
            }

            .lobby-title {
                font-size: 30px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="brand-strip">
            <div class="brand-left">
                <img src="/auction-logo.svg" alt="Auction Premier logo" onerror="this.onerror=null;this.src='/auction-logo.svg.webp';">
                <div>
                    <div class="brand-title">Auction Premier</div>
                    <div class="brand-sub">Franchise Lobby Control Room</div>
                </div>
            </div>
            <div class="brand-pill">Team Selection Live</div>
        </div>

        <header class="header">
            <div class="room-meta">
                <span class="room-code" id="roomCode">-----</span>
                <button class="copy-btn" onclick="copyRoomCode()">Copy Code</button>
                <span id="modeIndicator" class="mode-chip">Loading...</span>
            </div>
            <div class="lobby-title">Auction Lobby</div>
        </header>

        <section class="quick-stats">
            <article class="stat-card">
                <div class="stat-label">Franchises Available</div>
                <div class="stat-value" id="availableTeamsCount">10</div>
            </article>
            <article class="stat-card">
                <div class="stat-label">Teams Locked In</div>
                <div class="stat-value" id="takenTeamsCount">0</div>
            </article>
            <article class="stat-card">
                <div class="stat-label">Players Connected</div>
                <div class="stat-value" id="connectedPlayersCount">0</div>
            </article>
        </section>

        <div class="teams-grid" id="teamsGrid"></div>

        <section class="panels">
            <div class="players-list">
                <h3>Players In Room (<span id="playerCount">0</span>/10)</h3>
                <div id="playersList" class="players-wrap"></div>
            </div>

            <div class="status-panel">
                <h3>Room Status</h3>
                <div class="info-points">
                    <div>Choose your franchise card above.</div>
                    <div>Auction starts only by auctioneer.</div>
                    <div>All picks sync in real-time.</div>
                </div>
                <button class="start-btn" id="startBtn" onclick="startAuction()" style="display: none;">Start Live Auction</button>
                <div id="warning" class="warning"></div>
            </div>
        </section>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        const teamPalette = {
            MI: '#2d80ff',
            CSK: '#ffe247',
            RCB: '#f44336',
            KKR: '#b183ff',
            RR: '#ff7eb6',
            SRH: '#ff8b2d',
            DC: '#58a6ff',
            PBKS: '#ff6468',
            GT: '#759cff',
            LSG: '#46d7f5'
        };
        const teamLogoMap = {
            MI: 'mi_Logo.svg.png',
            CSK: 'csk_Logo.svg.webp',
            RCB: 'rcb_Logo.svg.png',
            KKR: 'kkr_Logo.svg.webp',
            RR: 'rr_Logo.svg.png',
            SRH: 'srh_Logo.svg.webp',
            DC: 'dc_Logo.svg.webp',
            PBKS: 'pk_Logo.svg.webp',
            GT: 'gt_Logo.svg.png',
            LSG: 'lsg_Logo.svg.webp'
        };
        const urlParams = new URLSearchParams(window.location.search);
        const roomCode = (urlParams.get('room') || '').toUpperCase();
        const playerName = localStorage.getItem('playerName');
        const roomPassword = localStorage.getItem('roomPassword') || '';
        let myTeam = null;
        let isAuctioneer = false;
        let auctioneerId = null;
        let currentMode = 'manual';
        let teamsData = null;
        let audioCtx = null;
        let startAuctionTriggered = false;
        let auctionRedirectInProgress = false;
        let startSoundPlayed = false;
        let handoffTimer = null;
        const startSound = new Audio('/sounds/Ipl%20Message.mp3');
        startSound.preload = 'auto';
        startSound.loop = false;

        if (!roomCode || !playerName) {
            window.location.href = '/';
        }

        socket.emit('joinRoom', { roomCode, password: roomPassword, playerName });

        socket.on('roomJoined', (data) => {
            if (data.phase === 'playing11') {
                window.location.href = `/playing11.html?room=${data.roomCode}`;
                return;
            }
            document.getElementById('roomCode').innerText = data.roomCode;
            currentMode = data.mode === 'ai_trainer' ? 'ai' : (data.mode || 'manual');
            auctioneerId = data.auctioneerId || auctioneerId;
            isAuctioneer = auctioneerId === socket.id;
            document.getElementById('modeIndicator').innerText = (data.mode === 'ai' || data.mode === 'ai_trainer')
                ? 'AI Mode'
                : 'Manual Mode';
            document.getElementById('startBtn').style.display = isAuctioneer ? 'block' : 'none';
            teamsData = data.teams;
            updateTeamsDisplay(data.teams);
        });

        socket.on('teamsUpdate', (teams) => {
            teamsData = teams;
            updateTeamsDisplay(teams);
        });

        socket.on('playersUpdate', (players) => {
            updatePlayersList(players);

            const player = players.find((p) => p.id === socket.id);
            if (player && typeof player.isAuctioneer === 'boolean') {
                isAuctioneer = player.isAuctioneer;
                if (player.isAuctioneer) {
                    auctioneerId = player.id;
                }
            }
            document.getElementById('startBtn').style.display = isAuctioneer ? 'block' : 'none';
            updateTeamsDisplay(teamsData || {});
        });

        socket.on('auctionStarted', () => {
            if (!startSoundPlayed) {
                playStartAuctionSound();
                startSoundPlayed = true;
            }
            trackStartSoundHandoff();
            if (auctionRedirectInProgress) return;
            auctionRedirectInProgress = true;

            setTimeout(() => {
                writeStartSoundHandoff();
                window.location.href = `/auction.html?room=${roomCode}`;
            }, 140);
        });

        socket.on('playingXIStarted', (data) => {
            const nextRoomCode = (data && data.roomCode) || roomCode;
            showToast('Auction complete. Opening Playing XI room...');
            setTimeout(() => {
                window.location.href = `/playing11.html?room=${nextRoomCode}`;
            }, 1200);
        });

        socket.on('error', (error) => {
            if ((error || '').toLowerCase().includes('room not found')) {
                showToast('Room expired or not found. Redirecting to home...');
                setTimeout(() => {
                    window.location.href = '/';
                }, 1200);
                return;
            }
            alert(error);
        });

        function formatPurseCr(value) {
            let amountCr = Number(value);
            if (!Number.isFinite(amountCr)) amountCr = 0;

            // If backend ever sends purse in rupees, normalize to crore.
            if (Math.abs(amountCr) >= 1000) {
                amountCr = amountCr / 10000000;
            }

            const rounded = Number(amountCr.toFixed(2));
            const text = Number.isInteger(rounded)
                ? String(rounded)
                : rounded.toFixed(2).replace(/\.0+$/, '').replace(/(\.\d*[1-9])0+$/, '$1');
            return 'Rs.' + text + ' Cr';
        }

        function updateTeamsDisplay(teams) {
            const grid = document.getElementById('teamsGrid');
            grid.innerHTML = '';
            myTeam = null;

            const teamList = Object.entries(teams);
            let availableCount = 0;
            let takenCount = 0;
            const manualAuctioneerControlOnly = currentMode === 'manual' && isAuctioneer;

            for (const [code, team] of teamList) {
                const card = document.createElement('div');
                card.className = 'team-card';
                card.style.setProperty('--team-color', teamPalette[code] || '#ffc44d');
                if (team.socketId === socket.id) {
                    card.classList.add('selected');
                    myTeam = code;
                }
                if (team.socketId && team.socketId !== socket.id) {
                    card.classList.add('taken');
                    takenCount++;
                }
                if (!team.socketId) availableCount++;

                const actionHtml = !team.socketId
                    ? (manualAuctioneerControlOnly
                        ? '<div class="status-chip taken">Auctioneer Locked</div>'
                        : `<div class="team-action"><button class="team-btn" onclick="selectTeam('${code}')">Select Team</button></div>`)
                    : (team.socketId === socket.id
                        ? '<div class="status-chip mine">Your Team</div>'
                        : '<div class="status-chip taken">Taken</div>');

                card.innerHTML = `
                    <div class="team-top">
                        <img class="team-logo team-logo-${code}" src="/images/teams/${teamLogoMap[code] || (code + '.png')}" alt="${code} logo" loading="lazy" decoding="async" onerror="this.onerror=null;this.src='/images/teams/${code}.svg';">
                        <div>
                            <div class="team-name">${team.name}</div>
                            <div class="team-code">${code}</div>
                        </div>
                    </div>
                    <div class="team-info">Purse: ${formatPurseCr(team.purse)}</div>
                    <div class="team-info">Squad: ${team.players.length}/25 players</div>
                    <div class="team-info">Overseas: ${team.overseasCount}/8</div>
                    ${actionHtml}
                `;

                grid.appendChild(card);
            }

            document.getElementById('availableTeamsCount').innerText = availableCount;
            document.getElementById('takenTeamsCount').innerText = takenCount;

            if (manualAuctioneerControlOnly) {
                document.getElementById('warning').innerText = 'You are the auctioneer. In manual mode you control the auction room and cannot select a franchise.';
            } else if (availableCount === 0 && myTeam) {
                document.getElementById('warning').innerText = 'All teams selected. Waiting for auctioneer to begin.';
            } else if (currentMode === 'manual' && !myTeam) {
                document.getElementById('warning').innerText = 'Choose a franchise. Only the auctioneer can nominate players and mark sold or unsold in manual mode.';
            }
        }

        function updatePlayersList(players) {
            const container = document.getElementById('playersList');
            const count = document.getElementById('playerCount');
            const connectedCount = players.filter((player) => player.connected !== false).length;
            count.innerText = players.length;
            document.getElementById('connectedPlayersCount').innerText = connectedCount;

            container.innerHTML = '';
            for (const player of players) {
                const div = document.createElement('div');
                div.className = 'player-item';
                if (player.connected === false) {
                    div.classList.add('reconnecting');
                }
                const roleText = player.isAuctioneer
                    ? 'Auctioneer'
                    : (player.team && teamsData && teamsData[player.team]
                        ? teamsData[player.team].name
                        : 'Choosing team...');
                div.innerHTML = `
                    <span>${player.name}</span>
                    <span class="player-role">${roleText}${player.connected === false ? ' (reconnecting...)' : ''}</span>
                `;
                container.appendChild(div);
            }
        }

        function selectTeam(teamCode) {
            if (currentMode === 'manual' && isAuctioneer) {
                alert('Auctioneer cannot select a franchise in manual mode.');
                return;
            }
            socket.emit('selectTeam', { roomCode, teamCode, playerName });
        }

        function playStartAuctionSound() {
            startSound.currentTime = 0;
            const mediaPlayPromise = startSound.play();
            if (mediaPlayPromise && typeof mediaPlayPromise.catch === 'function') {
                mediaPlayPromise.catch(() => {
                    playStartAuctionToneFallback();
                });
            }
        }

        function writeStartSoundHandoff() {
            try {
                sessionStorage.setItem('auctionStartSoundHandoff', JSON.stringify({
                    roomCode,
                    currentTime: Number(startSound.currentTime || 0),
                    startedAt: Date.now()
                }));
            } catch (_err) {
                // Ignore storage errors; audio still plays in current page.
            }
        }

        function trackStartSoundHandoff() {
            writeStartSoundHandoff();
            if (handoffTimer) clearInterval(handoffTimer);
            handoffTimer = setInterval(writeStartSoundHandoff, 120);
            startSound.onended = () => {
                if (handoffTimer) {
                    clearInterval(handoffTimer);
                    handoffTimer = null;
                }
                try {
                    sessionStorage.removeItem('auctionStartSoundHandoff');
                } catch (_err) {
                    // Ignore storage errors.
                }
            };
        }

        function playStartAuctionToneFallback() {
            const Ctx = window.AudioContext || window.webkitAudioContext;
            if (!Ctx) return;

            if (!audioCtx) {
                audioCtx = new Ctx();
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }

            const now = audioCtx.currentTime;
            const sequence = [420, 560, 760];

            sequence.forEach((freq, index) => {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();

                osc.type = 'triangle';
                osc.frequency.setValueAtTime(freq, now + index * 0.1);

                gain.gain.setValueAtTime(0.0001, now + index * 0.1);
                gain.gain.exponentialRampToValueAtTime(0.055, now + index * 0.1 + 0.02);
                gain.gain.exponentialRampToValueAtTime(0.0001, now + index * 0.1 + 0.12);

                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start(now + index * 0.1);
                osc.stop(now + index * 0.1 + 0.15);
            });
        }

        function startAuction() {
            if (isAuctioneer) {
                if (startAuctionTriggered) return;
                startAuctionTriggered = true;
                const startBtn = document.getElementById('startBtn');
                startBtn.disabled = true;
                startBtn.innerText = 'Starting...';
                socket.emit('startAuction', roomCode);
            }
        }

        window.addEventListener('beforeunload', () => {
            if (handoffTimer) {
                clearInterval(handoffTimer);
                handoffTimer = null;
            }
            writeStartSoundHandoff();
        });

        function copyRoomCode() {
            navigator.clipboard.writeText(roomCode);
            showToast(`Join code copied: ${roomCode}`);
        }

        function showToast(text) {
            const old = document.getElementById('lobbyToast');
            if (old) old.remove();

            const toast = document.createElement('div');
            toast.id = 'lobbyToast';
            toast.className = 'toast';
            toast.innerText = text;
            document.body.appendChild(toast);

            requestAnimationFrame(() => {
                toast.classList.add('show');
            });

            setTimeout(() => {
                toast.classList.remove('show');
                setTimeout(() => toast.remove(), 220);
            }, 2200);
        }
    </script>
</body>
</html>
